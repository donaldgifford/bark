# License policy for the bark internal pipeline.
# Uses SPDX license identifiers: https://spdx.org/licenses/

# Licenses that are unconditionally allowed.
allowed_spdx:
  # Permissive
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - 0BSD
  - Unlicense
  - CC0-1.0
  - Zlib
  - Python-2.0
  # Weak copyleft (library use is permitted)
  - LGPL-2.1-only
  - LGPL-2.1-or-later
  - LGPL-3.0-only
  - LGPL-3.0-or-later
  - MPL-2.0

# Licenses that trigger a warning but do not block the pipeline.
# Packages with these licenses require legal review before broad distribution.
warn_spdx:
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0-only
  - AGPL-3.0-or-later

# Licenses that block the pipeline entirely.
denied_spdx:
  # Non-commercial
  - CC-BY-NC-4.0
  - CC-BY-NC-SA-4.0
  - CC-BY-NC-ND-4.0
  # Business Source / server-side restriction
  - BUSL-1.1
  - SSPL-1.0
  # Old strong copyleft versions
  - AGPL-1.0-only
  - GPL-1.0-only
